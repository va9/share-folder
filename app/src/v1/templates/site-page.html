<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}} - {{SITE_TITLE}}</title>
  <style>{{CSS}}</style>
  <link rel="stylesheet" href="{{PATH_TO_ROOT}}assets/site.css">
</head>
<body class="site-page" data-theme="light">
  <div class="site-layout">
    <button class="sidebar-toggle" aria-label="Toggle navigation">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <nav class="site-sidebar" id="site-sidebar">
      <div class="sidebar-header">
        <a href="{{PATH_TO_ROOT}}index.html" class="site-title">{{SITE_TITLE}}</a>
        <button class="search-trigger" id="search-trigger" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <span class="search-shortcut">Ctrl+K</span>
        </button>
      </div>
      <div class="nav-tree" id="nav-tree">{{SIDEBAR}}</div>
    </nav>

    <main class="site-content">
      <article class="page-content markdown-preview-view">
        {{CONTENT}}
      </article>
      {{TAGS}}
      {{BACKLINKS}}
    </main>
  </div>

  <div class="search-overlay" id="search-overlay" style="display:none">
    <div class="search-modal">
      <input type="text" class="search-input" id="search-input" placeholder="Search pages..." autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
  </div>

  <script>window.__NAV_TREE__ = {{NAV_JSON}};</script>
  <script>window.__CURRENT_SLUG__ = {{CURRENT_SLUG_JSON}};</script>
  <script>window.__PATH_TO_ROOT__ = {{PATH_TO_ROOT_JSON}};</script>
  <script>window.__SEARCH_INDEX_URL__ = {{SEARCH_INDEX_URL_JSON}};</script>
  <script src="{{PATH_TO_ROOT}}assets/sidebar.js"></script>
  <script src="{{PATH_TO_ROOT}}assets/search.js"></script>
  <script src="{{PATH_TO_ROOT}}assets/theme-toggle.js"></script>
</body>
</html>
